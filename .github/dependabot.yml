version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/.github/trivy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
      - "trivy"
    open-pull-requests-limit: 5
