services:
  # Redis (queue backend + cache)
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rag-server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-1}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-0}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_TIMEOUT_SECONDS=${OPENAI_EMBEDDING_TIMEOUT_SECONDS:-300}
      - INGEST_EXTRACT_JOB_TIMEOUT_SECONDS=${INGEST_EXTRACT_JOB_TIMEOUT_SECONDS:-900}
      - INGEST_INDEX_JOB_TIMEOUT_SECONDS=${INGEST_INDEX_JOB_TIMEOUT_SECONDS:-1800}
      - INGEST_STALE_UPLOADED_SECONDS=${INGEST_STALE_UPLOADED_SECONDS:-3600}
      - INGEST_STALE_EXTRACTING_SECONDS=${INGEST_STALE_EXTRACTING_SECONDS:-1800}
      - INGEST_STALE_INDEXING_SECONDS=${INGEST_STALE_INDEXING_SECONDS:-3600}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - ENVIRONMENT=development
    volumes:
      - ./server:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # RQ Workers (Extract)
  worker-extract:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-1}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-0}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_TIMEOUT_SECONDS=${OPENAI_EMBEDDING_TIMEOUT_SECONDS:-300}
      - INGEST_EXTRACT_JOB_TIMEOUT_SECONDS=${INGEST_EXTRACT_JOB_TIMEOUT_SECONDS:-900}
      - INGEST_INDEX_JOB_TIMEOUT_SECONDS=${INGEST_INDEX_JOB_TIMEOUT_SECONDS:-1800}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - QUEUE_NAME=ingest_extract
      - WORKER_COUNT=4
    volumes:
      - ./worker:/app
      - ./server/app:/app/shared  # Share code
    depends_on:
      - redis
    deploy:
      replicas: 4
    command: python worker.py ingest_extract

  # RQ Workers (Index)
  worker-index:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-1}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-0}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_TIMEOUT_SECONDS=${OPENAI_EMBEDDING_TIMEOUT_SECONDS:-300}
      - INGEST_EXTRACT_JOB_TIMEOUT_SECONDS=${INGEST_EXTRACT_JOB_TIMEOUT_SECONDS:-900}
      - INGEST_INDEX_JOB_TIMEOUT_SECONDS=${INGEST_INDEX_JOB_TIMEOUT_SECONDS:-1800}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - QUEUE_NAME=ingest_index
      - WORKER_COUNT=4
    volumes:
      - ./worker:/app
      - ./server/app:/app/shared
    depends_on:
      - redis
    deploy:
      replicas: 4
    command: python worker.py ingest_index

  # RQ Dashboard (monitoring)
  rq-dashboard:
    image: eoranged/rq-dashboard
    container_name: rag-rq-dashboard
    environment:
      - RQ_DASHBOARD_REDIS_URL=redis://redis:6379/0
    ports:
      - "9181:9181"
    depends_on:
      - redis

  # React Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: rag-client
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  redis_data:
  client_node_modules:
